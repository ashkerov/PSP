<script>
  const params = new URLSearchParams(window.location.search);
  const fromId = params.get("from");

  if (fromId) {
    document.getElementById("back-buttons").style.display = "flex";

    const select = document.getElementById("field-tariff");
    for (const option of select.options) {
      if (option.value === fromId) {
        option.selected = true;
        break;
      }
    }

    document.getElementById("back-to-product").addEventListener("click", () => {
      window.location.href = "tariffs.html?open=" + fromId;
    });

    document.getElementById("back-to-all").addEventListener("click", () => {
      window.location.href = "tariffs.html";
    });
  }

  document
    .getElementById("form-submit-btn")
    .addEventListener("click", function () {
      const name = document.getElementById("field-name").value.trim();
      const phone = document.getElementById("field-phone").value.trim();
      const email = document.getElementById("field-email").value.trim();
      const tariff = document.getElementById("field-tariff").value;
      const comment = document.getElementById("field-comment").value.trim();

      if (!name || !phone || !email) {
        alert("Пожалуйста, заполните обязательные поля: Имя, Телефон и Email");
        return;
      }

      const xhr = new XMLHttpRequest();
      xhr.open("POST", "http://localhost:3000/requests");
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.send(JSON.stringify({ name, phone, email, tariff, comment }));
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            document.getElementById("form-content").style.display = "none";
            document.getElementById("form-success").style.display = "block";
          } else {
            alert("Ошибка при отправке заявки. Попробуйте снова.");
          }
        }
      };
    });
</script>
