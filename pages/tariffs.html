<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cloud_hosting.ru — Продукты</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <main>
      <div id="root"></div>
    </main>

    <div class="toast-container">
      <div
        id="lab-toast"
        class="toast align-items-center text-bg-success border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body">
            ✅ <span id="lab-toast-msg">Тариф выбран</span>
          </div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Закрыть"
          ></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { HeaderComponent } from "../js/components/header/index.js";
      import { FooterComponent } from "../js/components/footer/index.js";
      import { MainPage } from "../js/pages/main/index.js";

      new HeaderComponent(document.body).render();
      new FooterComponent(document.body).render();

      const root = document.getElementById("root");
      new MainPage(root).render();
    </script>
  </body>
</html>
