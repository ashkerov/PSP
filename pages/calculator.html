<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cloud_hosting.ru — Калькулятор</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/script.js" defer></script>
  </head>
  <body>
    <main>
      <div class="page">
        <div class="calc-wrapper">
          <div class="history-panel">
            <div class="history-title">История</div>
            <ul id="history-list" class="history-list"></ul>
          </div>
          <div class="calc">
            <div class="display-area">
              <div id="expression" class="expression expression--big">0</div>
              <div id="result" class="result result--hidden">0</div>
            </div>
            <div class="buttons">
              <div class="btn-row">
                <button id="btn_op_clear" class="my-btn secondary">C</button>
                <button id="btn_op_sign" class="my-btn secondary">+/−</button>
                <button id="btn_op_percent" class="my-btn secondary">%</button>
                <button id="btn_op_div" class="my-btn operator">÷</button>
              </div>
              <div class="btn-row">
                <button id="btn_digit_7" class="my-btn" data-val="7">7</button>
                <button id="btn_digit_8" class="my-btn" data-val="8">8</button>
                <button id="btn_digit_9" class="my-btn" data-val="9">9</button>
                <button id="btn_op_mult" class="my-btn operator">×</button>
              </div>
              <div class="btn-row">
                <button id="btn_digit_4" class="my-btn" data-val="4">4</button>
                <button id="btn_digit_5" class="my-btn" data-val="5">5</button>
                <button id="btn_digit_6" class="my-btn" data-val="6">6</button>
                <button id="btn_op_minus" class="my-btn operator">−</button>
              </div>
              <div class="btn-row">
                <button id="btn_digit_1" class="my-btn" data-val="1">1</button>
                <button id="btn_digit_2" class="my-btn" data-val="2">2</button>
                <button id="btn_digit_3" class="my-btn" data-val="3">3</button>
                <button id="btn_op_plus" class="my-btn operator">+</button>
              </div>
              <div class="btn-row">
                <button
                  id="btn_digit_0"
                  class="my-btn wide secondary"
                  data-val="0"
                >
                  0
                </button>
                <button
                  id="btn_digit_dot"
                  class="my-btn secondary"
                  data-val="."
                >
                  .
                </button>
                <button id="btn_op_equal" class="my-btn operator">=</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module">
      import { HeaderComponent } from "../js/components/header/index.js";
      import { FooterComponent } from "../js/components/footer/index.js";
      new HeaderComponent(document.body).render();
      new FooterComponent(document.body).render();
    </script>
  </body>
</html>
